name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-mcp:
    name: Test MCP Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/buiry-mcp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx tsc --noEmit
      - run: npm run build

  test-api:
    name: Test Cloud Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx tsc --noEmit
      - run: npm run build

  test-web:
    name: Test React App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx tsc --noEmit

  test-data-agent:
    name: Test Data Agent
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/data-agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx tsc --noEmit
      - run: npm run build

  test-sdk:
    name: Test TypeScript SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk-ts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx tsc --noEmit
      - run: npm run build

  test-adk:
    name: Test ADK Agents
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/adk-agents
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python3 -c "import ast; [ast.parse(open(f).read()) for f in ['agents/coordinator.py', 'agents/dev_agent.py', 'agents/review_agent.py', 'agents/orchestrator.py']]"

  verify-system:
    name: Verify System Integration
    runs-on: ubuntu-latest
    needs: [test-mcp, test-api, test-web, test-data-agent, test-sdk, test-adk]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: |
          node -e "const m=JSON.parse(require('fs').readFileSync('BuildDocs/Build-Context-Memory.json','utf8')); if(m.sessions.length<10) throw new Error('Insufficient sessions'); console.log('Memory OK', m.sessions.length, 'sessions')"
      - run: ls packages/buiry-mcp/dist/index.js apps/api/dist/index.js apps/web/dist 2>/dev/null || echo "Some builds not yet in CI cache"

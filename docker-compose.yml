services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: buiry-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: buiry
      POSTGRES_PASSWORD: buiry_dev_password
      POSTGRES_DB: buiry_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buiry"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
